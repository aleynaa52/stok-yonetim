spring.application.name=stok-yonetim

# Sanal hafizada (RAM) calisacak sifir indirmeli H2 veri tabani ayari
spring.datasource.url=jdbc:h2:mem:stokdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Tablolari otomatik olusturma ayari
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Postman'den istek attigimizda arkada donen sorgulari konsolda acikca goster
spring.jpa.show-sql=true

# H2 Konsol ayari
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

# YENI SURUM UYUMLU SABIT SIFRE AYARLARI (Postman için kesin çözüm)
spring.security.user.name=admin
spring.security.user.password=admin123